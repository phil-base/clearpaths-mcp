<VirtualHost *:80>
    ServerName mcp.clearpaths.pro

    # Redirect all HTTP to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName mcp.clearpaths.pro

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/mcp.clearpaths.pro/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/mcp.clearpaths.pro/privkey.pem

    # Reverse proxy to Node.js MCP server
    ProxyPreserveHost On
    ProxyPass /mcp http://127.0.0.1:3001/mcp
    ProxyPassReverse /mcp http://127.0.0.1:3001/mcp

    ProxyPass /health http://127.0.0.1:3001/health
    ProxyPassReverse /health http://127.0.0.1:3001/health

    # SSE support — disable buffering
    SetEnv proxy-sendchunked 1
    SetEnv proxy-sendcl 0

    <Location /mcp>
        # Required for SSE streaming
        ProxyPass http://127.0.0.1:3001/mcp
        SetEnv proxy-initial-not-pooled 1
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/mcp-clearpaths_error.log
    CustomLog ${APACHE_LOG_DIR}/mcp-clearpaths_access.log combined
</VirtualHost>
